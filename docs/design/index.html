<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1320"/>
<title>Rick & Linda Care App — Module 01 · v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="styles.css"/>
<style>
  body {
    background:
      radial-gradient(1200px 600px at 20% -200px, oklch(0.96 0.03 195 / 0.55), transparent),
      radial-gradient(1000px 500px at 100% 20%, oklch(0.97 0.025 50 / 0.5), transparent),
      var(--canvas);
    min-height: 100vh;
  }
  .app-wrap { max-width: 1320px; margin: 0 auto; padding-bottom: 140px; }
  .phone-stage {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 48px;
    padding: 16px 36px 40px;
    align-items: start;
  }
  .phone-frame {
    width: 420px; height: 860px;
    background: oklch(0.16 0.008 260);
    border-radius: 52px;
    padding: 11px;
    box-shadow:
      0 40px 90px oklch(0.2 0.01 260 / 0.22),
      0 0 0 1px oklch(0.2 0.01 260 / 0.15),
      inset 0 0 0 1px oklch(1 0 0 / 0.06);
    position: sticky; top: 16px;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: var(--canvas);
    border-radius: 41px;
    overflow: hidden; overflow-y: auto;
    position: relative;
  }
  /* Status bar strip */
  .status-bar {
    height: 28px; padding: 0 22px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px; font-weight: 600; color: var(--ink-2);
    position: sticky; top: 0; z-index: 6;
    background: var(--canvas);
  }
  .status-bar::before {
    content: ''; position: absolute; left: 50%; top: 4px;
    transform: translateX(-50%);
    width: 110px; height: 26px; background: oklch(0.10 0 0); border-radius: 99px;
  }
  .side-panel { padding: 16px 24px 24px; max-width: 640px; }
  .design-notes { margin: 0; padding: 0; list-style: none; }
  .design-notes li {
    padding: 10px 12px 10px 28px; position: relative;
    font-size: 13.5px; line-height: 1.55; color: var(--ink-2);
    border-bottom: 1px solid var(--hairline);
  }
  .design-notes li::before {
    content: ''; position: absolute; left: 10px; top: 18px;
    width: 6px; height: 6px; border-radius: 999px; background: var(--accent);
  }
  .design-notes li:last-child { border-bottom: 0; }
  .tweak-panel {
    position: fixed; bottom: 80px; right: 20px;
    width: 280px; z-index: 999; box-shadow: var(--shadow-2);
  }
  @media (max-width: 1000px) {
    .phone-stage { grid-template-columns: 1fr; gap: 16px; padding: 16px; }
    .phone-frame { margin: 0 auto; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="log-store.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="modals.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
